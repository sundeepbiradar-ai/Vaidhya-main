<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Comparison App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        .hospital-card { margin: 10px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .search-section { margin: 20px 0; padding: 20px; background: #f8f9fa; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">Hospital Comparison Platform</h1>

        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="search-section">
                    <h3>Find Hospitals</h3>
                    <div class="row">
                        <div class="col-md-6">
                            <input type="text" id="cityInput" class="form-control" placeholder="Enter city">
                        </div>
                        <div class="col-md-6">
                            <input type="text" id="searchInput" class="form-control" placeholder="Hospital name or specialty">
                        </div>
                    </div>
                    <button id="searchBtn" class="btn btn-primary mt-3">Search Hospitals</button>
                </div>

                <div id="results" class="mt-4">
                    <h4>Search Results:</h4>
                    <div id="hospitalsList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001';

        document.getElementById('searchBtn').addEventListener('click', async () => {
            const city = document.getElementById('cityInput').value;
            const q = document.getElementById('searchInput').value;

            try {
                const response = await fetch(`${API_BASE}/api/hospitals/search?city=${encodeURIComponent(city)}&q=${encodeURIComponent(q)}`);
                const data = await response.json();

                displayHospitals(data.results || []);
            } catch (error) {
                console.error('Search failed:', error);
                document.getElementById('hospitalsList').innerHTML = '<div class="alert alert-danger">Error loading hospitals. Make sure the backend server is running.</div>';
            }
        });

        function displayHospitals(hospitals) {
            const container = document.getElementById('hospitalsList');

            if (hospitals.length === 0) {
                container.innerHTML = '<div class="alert alert-info">No hospitals found. Try a different search.</div>';
                return;
            }

            container.innerHTML = hospitals.map(hospital => `
                <div class="hospital-card">
                    <h5>${hospital.name}</h5>
                    <p><strong>Address:</strong> ${hospital.address}</p>
                    <p><strong>Rating:</strong> ${hospital.rating}/5</p>
                    <p><strong>Available Beds:</strong> ${hospital.bed_availability?.available || 'N/A'}/${hospital.bed_availability?.total || 'N/A'}</p>
                    <button class="btn btn-outline-primary btn-sm" onclick="viewHospital(${hospital.id})">View Details</button>
                </div>
            `).join('');
        }

        async function viewHospital(id) {
            try {
                const response = await fetch(`${API_BASE}/api/hospitals/${id}`);
                const data = await response.json();
                const hospital = data.hospital; // API returns { hospital: {...} }
                
                alert(`Hospital Details:\n\nName: ${hospital.name}\nAddress: ${hospital.address}\nPhone: ${hospital.contact_number}\nRating: ${hospital.rating}/5\n\nServices: ${hospital.departments?.join(', ') || 'Not specified'}`);
            }
        }

        // Load some hospitals on page load
        window.addEventListener('load', () => {
            document.getElementById('searchBtn').click();
        });
    </script>
</body>
</html>
